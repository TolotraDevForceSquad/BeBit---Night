        // Composant principal App
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [data, setData] = useState(initialData);
            const [currentView, setCurrentView] = useState('login');
            const [selectedTable, setSelectedTable] = useState(null);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [modalContent, setModalContent] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            // Fonctions utilitaires pour relations
            const getTableById = (id) => data.posTables.find(t => t.id === id);
            const getOrderById = (id) => data.orders.find(o => o.id === id);
            const getProductById = (id) => data.products.find(p => p.id === id);
            const getCategoryById = (id) => data.productCategories.find(c => c.id === id);
            const getEmployeeById = (id) => data.employees.find(e => e.id === id);
            const getOrderItemsByOrder = (orderId) => data.orderItems.filter(oi => oi.orderId === orderId);
            const getProductsByCategory = (catId) => data.products.filter(p => p.categoryId === catId && p.isAvailable);
            const getHistoryForOrder = (orderId) => data.posHistory.filter(h => h.orderId === orderId);
            const getDeviceById = (id) => data.posDevices.find(d => d.id === id);

            // Fonction de login
            const handleLogin = (pin) => {
                const employee = data.employees.find(e => e.pin === pin && e.status);
                if (employee) {
                    setCurrentUser(employee);
                    setCurrentView('dashboard');
                } else {
                    alert('PIN incorrect ou employé inactif');
                }
            };

            // Fonction pour ouvrir une table
            const openTable = (table) => {
                let order = getOrderById(table.currentOrderId);
                if (!order) {
                    order = {
                        id: Date.now(),
                        tableId: table.id,
                        customerName: '',
                        status: 'En Attente',
                        total: 0,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString(),
                        paymentMethod: null,
                        priority: 'Normale',
                        estimatedCompletionTime: null
                    };
                    setData(prev => ({ ...prev, orders: [...prev.orders, order] }));
                    table.currentOrderId = order.id;
                    setData(prev => ({ ...prev, posTables: prev.posTables.map(t => t.id === table.id ? table : t) }));
                }
                setSelectedTable(table);
                setSelectedOrder(order);
                setCurrentView('tableDetail');
            };

            // Ajouter un item à une commande
            const addOrderItem = (product, quantity = 1, notes = '') => {
                if (!selectedOrder) return;
                const existing = getOrderItemsByOrder(selectedOrder.id).find(oi => oi.productId === product.id);
                let newItem;
                if (existing) {
                    newItem = { ...existing, quantity: existing.quantity + quantity, subtotal: (existing.price * (existing.quantity + quantity)), notes };
                } else {
                    newItem = {
                        id: Date.now(),
                        orderId: selectedOrder.id,
                        productId: product.id,
                        quantity,
                        price: product.price,
                        notes,
                        subtotal: product.price * quantity,
                        status: 'En Cours',
                        category: getCategoryById(product.categoryId)?.name || '',
                        preparationTime: Math.floor(Math.random() * 20) + 5
                    };
                }
                setData(prev => ({ ...prev, orderItems: [...prev.orderItems.filter(oi => !(oi.orderId === selectedOrder.id && oi.productId === product.id)), newItem] }));
                updateOrderTotal(selectedOrder.id);
                addHistory('Article Ajouté', `Ajout de ${product.name} x${quantity}`, product.price * quantity, selectedOrder.id, selectedTable.id, selectedTable.name);
            };

            // Mettre à jour total commande
            const updateOrderTotal = (orderId) => {
                const items = getOrderItemsByOrder(orderId);
                const total = items.reduce((sum, item) => sum + item.subtotal, 0);
                setData(prev => ({ ...prev, orders: prev.orders.map(o => o.id === orderId ? { ...o, total, updatedAt: new Date().toISOString() } : o) }));
            };

            // Changer statut commande
            const updateOrderStatus = (status) => {
                if (!selectedOrder) return;
                setData(prev => ({ ...prev, orders: prev.orders.map(o => o.id === selectedOrder.id ? { ...o, status } : o) }));
                addHistory('Statut Mis à Jour', `Statut changé en ${status}`, 0, selectedOrder.id, selectedTable.id, selectedTable.name);
                if (status === 'Payé') {
                    setCurrentView('dashboard');
                }
            };

            // Ajouter à l'historique
            const addHistory = (type, description, amount, orderId, tableId, tableName) => {
                const history = {
                    id: Date.now(),
                    type,
                    description,
                    userId: currentUser?.id,
                    userName: currentUser?.name,
                    userRole: currentUser?.role,
                    timestamp: new Date().toISOString(),
                    amount,
                    orderId,
                    tableId,
                    tableName,
                    details: '',
                    status: 'Enregistré'
                };
                setData(prev => ({ ...prev, posHistory: [history, ...prev.posHistory] }));
            };

            // Modal générique
            const Modal = ({ isOpen, onClose, children }) => {
                if (!isOpen) return null;
                return (
                    <div className="modal">
                        <div className="modal-content">
                            <button onClick={onClose} className="float-right text-red-500">✕</button>
                            {children}
                        </div>
                    </div>
                );
            };

            // Composant Login
            const Login = () => {
                const [pin, setPin] = useState('');
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4">
                        <h1 className="text-2xl font-bold mb-8">Connexion POS</h1>
                        <input
                            type="password"
                            value={pin}
                            onChange={(e) => setPin(e.target.value)}
                            placeholder="Entrez votre PIN"
                            className="p-3 border rounded mb-4 w-full max-w-md text-center text-lg"
                            maxLength={4}
                        />
                        <button onClick={() => handleLogin(pin)} className="bg-blue-500 text-white p-3 rounded w-full max-w-md">Se Connecter</button>
                    </div>
                );
            };

            // Composant Dashboard (Tables)
            const Dashboard = () => {
                const tables = data.posTables.map(table => ({
                    ...table,
                    order: getOrderById(table.currentOrderId)
                })).filter(t => !searchTerm || t.name.toLowerCase().includes(searchTerm.toLowerCase()) || t.area.toLowerCase().includes(searchTerm.toLowerCase()));

                return (
                    <div className="p-4">
                        <h1 className="text-xl font-bold mb-4">Tableau de Bord</h1>
                        <input
                            type="text"
                            placeholder="Rechercher tables..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="p-2 border rounded mb-4 w-full"
                        />
                        <div className="table-grid">
                            {tables.map(table => (
                                <div key={table.id} className={`p-2 rounded border ${table.status === 'Libre' ? 'bg-green-100' : table.status === 'Occupée' ? 'bg-yellow-100' : 'bg-red-100'}`}>
                                    <img src={table.imageUrl} alt={table.name} className="w-full h-20 object-cover rounded mb-2" />
                                    <h3 className="font-semibold">{table.name}</h3>
                                    <p className="text-sm">{table.area} - Cap: {table.capacity}</p>
                                    <p className="text-sm font-bold">{table.status}</p>
                                    {table.order && <p className="text-sm">Total: {table.order.total}€</p>}
                                    <button onClick={() => openTable(table)} className="mt-2 bg-blue-500 text-white p-1 rounded text-sm w-full">Ouvrir</button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // Composant Détail Table
            const TableDetail = () => {
                if (!selectedTable || !selectedOrder) return <div>Chargement...</div>;
                const items = getOrderItemsByOrder(selectedOrder.id);
                const total = items.reduce((sum, i) => sum + i.subtotal, 0);

                return (
                    <div className="p-4">
                        <h1 className="text-xl font-bold mb-4">Table {selectedTable.name}</h1>
                        <input
                            placeholder="Nom Client"
                            value={selectedOrder.customerName}
                            onChange={(e) => setData(prev => ({ ...prev, orders: prev.orders.map(o => o.id === selectedOrder.id ? { ...o, customerName: e.target.value } : o) }))}
                            className="p-2 border rounded mb-4 w-full"
                        />
                        <div className="mb-4">
                            <h2 className="font-semibold mb-2">Articles ({items.length})</h2>
                            <div className="product-grid">
                                {data.productCategories.filter(c => c.isActive).map(cat => (
                                    <div key={cat.id} className="bg-gray-200 p-2 rounded">
                                        <h3 className="font-bold text-xs">{cat.name}</h3>
                                        {getProductsByCategory(cat.id).map(prod => (
                                            <button
                                                key={prod.id}
                                                onClick={() => addOrderItem(prod)}
                                                className="block w-full text-left p-1 bg-white rounded mt-1 text-xs"
                                            >
                                                {prod.name} - {prod.price}€
                                            </button>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="mb-4">
                            <h2 className="font-semibold mb-2">Commande Actuelle</h2>
                            {items.map(item => (
                                <div key={item.id} className="order-item flex justify-between">
                                    <span>{getProductById(item.productId)?.name} x{item.quantity}</span>
                                    <span>{item.subtotal}€</span>
                                    {item.notes && <span className="text-xs italic">({item.notes})</span>}
                                </div>
                            ))}
                            <div className="font-bold mt-2">Total: {total}€</div>
                        </div>
                        <div className="flex space-x-2 mb-4">
                            <select
                                value={selectedOrder.priority}
                                onChange={(e) => setData(prev => ({ ...prev, orders: prev.orders.map(o => o.id === selectedOrder.id ? { ...o, priority: e.target.value } : o) }))}
                                className="p-2 border rounded"
                            >
                                <option value="Basse">Basse</option>
                                <option value="Normale">Normale</option>
                                <option value="Haute">Haute</option>
                            </select>
                            <select
                                value={selectedOrder.paymentMethod || ''}
                                onChange={(e) => setData(prev => ({ ...prev, orders: prev.orders.map(o => o.id === selectedOrder.id ? { ...o, paymentMethod: e.target.value || null } : o) }))}
                                className="p-2 border rounded"
                            >
                                <option value="">Méthode Paiement</option>
                                {data.paymentMethods.map(pm => <option key={pm.id} value={pm.name}>{pm.name}</option>)}
                            </select>
                        </div>
                        <div className="flex space-x-2">
                            <button onClick={() => updateOrderStatus('En Préparation')} className="flex-1 bg-yellow-500 text-white p-2 rounded">Préparation</button>
                            <button onClick={() => updateOrderStatus('Servi')} className="flex-1 bg-green-500 text-white p-2 rounded">Servi</button>
                            <button onClick={() => updateOrderStatus('Payé')} className="flex-1 bg-blue-500 text-white p-2 rounded">Payé</button>
                        </div>
                        <button onClick={() => { setSelectedTable(null); setSelectedOrder(null); setCurrentView('dashboard'); }} className="mt-4 bg-gray-500 text-white p-2 rounded w-full">Retour</button>
                    </div>
                );
            };

            // Composant Liste Ordres
            const OrdersList = () => {
                const ordersList = data.orders
                    .map(order => ({
                        ...order,
                        table: getTableById(order.tableId),
                        items: getOrderItemsByOrder(order.id).length
                    }))
                    .filter(o => !searchTerm || o.customerName.toLowerCase().includes(searchTerm.toLowerCase()) || o.status.toLowerCase().includes(searchTerm.toLowerCase()))
                    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                return (
                    <div className="p-4">
                        <h1 className="text-xl font-bold mb-4">Commandes</h1>
                        <input
                            type="text"
                            placeholder="Rechercher commandes..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="p-2 border rounded mb-4 w-full"
                        />
                        {ordersList.map(order => (
                            <div key={order.id} className="bg-white p-3 rounded mb-2 shadow">
                                <div className="flex justify-between">
                                    <span>{order.customerName} - {order.table?.name}</span>
                                    <span className={`px-2 py-1 rounded text-sm ${order.status === 'Payé' ? 'bg-green-200' : order.status === 'En Préparation' ? 'bg-yellow-200' : 'bg-red-200'}`}>
                                        {order.status}
                                    </span>
                                </div>
                                <p className="text-sm">Total: {order.total}€ | Articles: {order.items}</p>
                                <p className="text-xs">Créé: {new Date(order.createdAt).toLocaleString()}</p>
                                <button onClick={() => { setSelectedOrder(order); setSelectedTable(order.table); setCurrentView('tableDetail'); }} className="text-blue-500 text-sm mt-1">Détails</button>
                            </div>
                        ))}
                    </div>
                );
            };

            // Composant Produits
            const Products = () => {
                const categories = data.productCategories.filter(c => c.isActive || !searchTerm || c.name.toLowerCase().includes(searchTerm.toLowerCase()));
                return (
                    <div className="p-4">
                        <h1 className="text-xl font-bold mb-4">Produits</h1>
                        <input
                            type="text"
                            placeholder="Rechercher produits/catégories..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="p-2 border rounded mb-4 w-full"
                        />
                        {categories.map(cat => (
                            <div key={cat.id} className="mb-4">
                                <h2 className="font-semibold flex items-center">
                                    <img src={cat.imageUrl} alt={cat.name} className="w-8 h-8 mr-2 rounded" />
                                    {cat.name}
                                </h2>
                                <p className="text-sm text-gray-600 mb-2">{cat.description}</p>
                                <div className="product-grid">
                                    {getProductsByCategory(cat.id).map(prod => (
                                        <div key={prod.id} className="bg-white p-2 rounded shadow">
                                            <img src={prod.imageUrl} alt={prod.name} className="w-full h-16 object-cover rounded mb-1" />
                                            <h3 className="font-semibold text-sm">{prod.name}</h3>
                                            <p className="text-xs">{prod.description}</p>
                                            <p className="font-bold text-sm">{prod.price}€</p>
                                            <p className={`text-xs ${prod.isAvailable ? 'text-green-600' : 'text-red-600'}`}>
                                                {prod.isAvailable ? 'Disponible' : 'Indisponible'}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            // Composant Historique
            const History = () => {
                const history = data.posHistory
                    .filter(h => !searchTerm || h.description.toLowerCase().includes(searchTerm.toLowerCase()) || h.userName.toLowerCase().includes(searchTerm.toLowerCase()))
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                return (
                    <div className="p-4">
                        <h1 className="text-xl font-bold mb-4">Historique</h1>
                        <input
                            type="text"
                            placeholder="Rechercher historique..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="p-2 border rounded mb-4 w-full"
                        />
                        {history.map(entry => (
                            <div key={entry.id} className="bg-white p-3 rounded mb-2 shadow">
                                <div className="flex justify-between">
                                    <span className="font-semibold">{entry.type}</span>
                                    <span className="text-sm text-gray-600">{new Date(entry.timestamp).toLocaleString()}</span>
                                </div>
                                <p>{entry.description}</p>
                                {entry.userName && <p className="text-sm">Par: {entry.userName} ({entry.userRole})</p>}
                                {entry.amount > 0 && <p className="font-bold">Montant: {entry.amount}€</p>}
                                {entry.tableName && <p className="text-sm">Table: {entry.tableName}</p>}
                                <span className={`px-1 py-0.5 rounded text-xs ${entry.status === 'Payé' ? 'bg-green-200' : entry.status === 'Erreur' ? 'bg-red-200' : 'bg-gray-200'}`}>
                                    {entry.status}
                                </span>
                            </div>
                        ))}
                    </div>
                );
            };

            // Composant Employés
            const Employees = () => (
                <div className="p-4">
                    <h1 className="text-xl font-bold mb-4">Employés</h1>
                    <input
                        type="text"
                        placeholder="Rechercher employés..."
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                        className="p-2 border rounded mb-4 w-full"
                    />
                    {data.employees.filter(e => !searchTerm || e.name.toLowerCase().includes(searchTerm.toLowerCase())).map(emp => (
                        <div key={emp.id} className="bg-white p-3 rounded mb-2 shadow flex items-center">
                            <img src={emp.imageUrl} alt={emp.name} className="w-12 h-12 rounded-full mr-3" />
                            <div className="flex-1">
                                <h3 className="font-semibold">{emp.name}</h3>
                                <p className="text-sm">{emp.role}</p>
                                <p className={`text-xs ${emp.status ? 'text-green-600' : 'text-red-600'}`}>{emp.status ? 'Actif' : 'Inactif'}</p>
                            </div>
                            <div className="device">{getDeviceById(emp.deviceId)?.name || 'Aucun'}</div>
                        </div>
                    ))}
                </div>
            );

            // Composant Appareils
            const Devices = () => (
                <div className="p-4">
                    <h1 className="text-xl font-bold mb-4">Appareils POS</h1>
                    <input
                        type="text"
                        placeholder="Rechercher appareils..."
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                        className="p-2 border rounded mb-4 w-full"
                    />
                    {data.posDevices.filter(d => !searchTerm || d.name.toLowerCase().includes(searchTerm.toLowerCase())).map(dev => (
                        <div key={dev.id} className="bg-white p-3 rounded mb-2 shadow">
                            <h3 className="font-semibold">{dev.name}</h3>
                            <p className="text-sm">Emplacement: {dev.location}</p>
                            <p className="text-sm">Ventes: {dev.sales}€</p>
                            <p className={`text-sm ${dev.status ? 'text-green-600' : 'text-red-600'}`}>{dev.status ? 'Actif' : 'Inactif'}</p>
                            <p className="text-xs">Dernière activité: {new Date(dev.lastActive).toLocaleString()}</p>
                            <img src={dev.imageUrl} alt={dev.name} className="mt-2 w-full h-20 object-cover rounded" />
                        </div>
                    ))}
                </div>
            );

            // Composant Paramètres
            const Settings = () => (
                <div className="p-4">
                    <h1 className="text-xl font-bold mb-4">Paramètres</h1>
                    <div>
                        <h2 className="font-semibold mb-2">Méthodes de Paiement</h2>
                        {data.paymentMethods.map(pm => (
                            <div key={pm.id} className="bg-white p-2 rounded mb-1 flex justify-between">
                                <span>{pm.name}</span>
                                <span className="text-sm">Valeur: {pm.value}</span>
                            </div>
                        ))}
                    </div>
                    <div className="mt-4">
                        <h2 className="font-semibold mb-2">Utilisateur Connecté</h2>
                        <p>{currentUser?.name} - {currentUser?.role}</p>
                        <button onClick={() => { setCurrentUser(null); setCurrentView('login'); }} className="bg-red-500 text-white p-2 rounded mt-2 w-full">Déconnexion</button>
                    </div>
                </div>
            );

            // Navigation inférieure
            const Nav = () => (
                <nav className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2">
                    <button onClick={() => setCurrentView('dashboard')} className={`p-2 ${currentView === 'dashboard' ? 'text-blue-500' : 'text-gray-500'}`}>🏠 Accueil</button>
                    <button onClick={() => setCurrentView('orders')} className={`p-2 ${currentView === 'orders' ? 'text-blue-500' : 'text-gray-500'}`}>📋 Commandes</button>
                    <button onClick={() => setCurrentView('products')} className={`p-2 ${currentView === 'products' ? 'text-blue-500' : 'text-gray-500'}`}>🍽️ Produits</button>
                    <button onClick={() => setCurrentView('history')} className={`p-2 ${currentView === 'history' ? 'text-blue-500' : 'text-gray-500'}`}>📊 Historique</button>
                    <button onClick={() => setCurrentView('settings')} className={`p-2 ${currentView === 'settings' ? 'text-blue-500' : 'text-gray-500'}`}>⚙️ Paramètres</button>
                </nav>
            );

            // Vues conditionnelles
            const renderView = () => {
                if (currentView === 'login') return <Login />;
                if (currentView === 'dashboard') return <Dashboard />;
                if (currentView === 'tableDetail') return <TableDetail />;
                if (currentView === 'orders') return <OrdersList />;
                if (currentView === 'products') return <Products />;
                if (currentView === 'history') return <History />;
                if (currentView === 'employees') return <Employees />;
                if (currentView === 'devices') return <Devices />;
                if (currentView === 'settings') return <Settings />;
                return <div>Vue non trouvée</div>;
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {currentUser && <Nav />}
                    {renderView()}
                    <Modal isOpen={showModal} onClose={() => setShowModal(false)}>
                        {modalContent}
                    </Modal>
                </div>
            );
        }

        // Rendu
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
