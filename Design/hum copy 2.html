            const [pin, setPin] = useState('');
            const [pinDots, setPinDots] = useState([false, false, false, false, false, false]);

            const handlePinInput = (digit) => {
                if (digit === 'backspace') {
                    const newPin = pin.slice(0, -1);
                    setPin(newPin);
                    setPinDots(Array(6).fill(false).map((_, i) => i < newPin.length));
                } else if (pin.length < 6) {
                    const newPin = pin + digit;
                    setPin(newPin);
                    setPinDots(Array(6).fill(false).map((_, i) => i < newPin.length));
                }
            };

            const handleSubmit = () => {
                if (pin.length === 6) {

                    onLogin();

                <div className="flex flex-col h-full">
                    <div className="flex border-b border-slate-200 dark:border-slate-700">
                        <button onClick={() => setActiveSubTab('history')} className={`flex-1 py-3 font-medium ${activeSubTab === 'history' ? 'border-b-2 border-primary text-primary' : 'text-slate-500 dark:text-slate-400'}`}>
                            Historique
                        </button>
                        <button onClick={() => setActiveSubTab('profile')} className={`flex-1 py-3 font-medium ${activeSubTab === 'profile' ? 'border-b-2 border-primary text-primary' : 'text-slate-500 dark:text-slate-400'}`}>
                            Profil
                        </button>
                    </div>
                    <div className="flex-1 overflow-hidden">
                        {activeSubTab === 'history' ? (
                            <HistorySubPage history={history} />
                        ) : (
                            <ProfileSubPage employees={employees} currentUserId={currentUserId} />
                        )}
                    </div>
                </div>
            );
        }

        // Composant principal App
        function App() {
            const [currentPage, setCurrentPage] = useState('login');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUserId, setCurrentUserId] = useState(null);
            const [data, setData] = useState({
                employees: [...mockEmployees],
                posDevices: [...mockPosDevices],
                productCategories: [...mockProductCategories],
                products: [...mockProducts],
                posTables: [...mockPosTables],
                orders: [...mockOrders],
                orderItems: [...mockOrderItems],
                posHistory: [...mockPosHistory],
                paymentMethods: [...mockPaymentMethods]
            });

            const handleLogin = () => {
                setIsLoggedIn(true);
                setCurrentUserId(1); // Simulation login comme Jean Dupont
                setCurrentPage('dashboard');
            };

            const updateCategory = (id, updates) => {
                setData(prev => ({
                    ...prev,
                    productCategories: prev.productCategories.map(c => c.id === id ? {...c, ...updates} : c)
                }));
            };

            const updateProduct = (id, updates) => {
                setData(prev => ({
                    ...prev,
                    products: prev.products.map(p => p.id === id ? {...p, ...updates} : p)
                }));
            };

            const updateTable = (id, updates) => {
                setData(prev => ({
                    ...prev,
                    posTables: prev.posTables.map(t => t.id === id ? {...t, ...updates} : t)
                }));
            };

            const updateOrder = (id, updates) => {
                if (id.toString().includes('orderItem')) {
                    // Pour orderItems
                    const itemId = parseInt(id.split('-')[1]);
                    setData(prev => ({
                        ...prev,
                        orderItems: prev.orderItems.map(item => item.id === itemId ? {...item, ...updates} : item)
                    }));
                } else {
                    // Pour orders
                    setData(prev => ({
                        ...prev,
                        orders: prev.orders.map(o => o.id === id ? {...o, ...updates} : o)
                    }));
                }
            };

            const renderPage = () => {
                switch (currentPage) {
                    case 'login':
                        return <LoginPage onLogin={handleLogin} />;
                    case 'dashboard':
                        return <DashboardPage orders={data.orders} tables={data.posTables} history={data.posHistory} />;
                    case 'category':
                        return <CategoryTab categories={data.productCategories} products={data.products} onUpdateCategory={updateCategory} onUpdateProduct={updateProduct} />;
                    case 'table':
                        return <TableTab tables={data.posTables} orders={data.orders} orderItems={data.orderItems} products={data.products} onUpdateTable={updateTable} onUpdateOrder={updateOrder} />;
                    case 'kitchen':
                        return <KitchenPage orders={data.orders} orderItems={data.orderItems} products={data.products} />;
                    case 'bar':
                        return <BarPage orders={data.orders} orderItems={data.orderItems} products={data.products} />;
                    case 'menu':
                        return <MenuTab history={data.posHistory} employees={data.employees} currentUserId={currentUserId} onLogout={() => { setIsLoggedIn(false); setCurrentPage('login'); }} />;
                    default:
                        return <LoginPage onLogin={handleLogin} />;
                }
            };

            if (!isLoggedIn && currentPage !== 'login') {
                setCurrentPage('login');
                return <LoginPage onLogin={handleLogin} />;
            }

            return (
                <div className="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark text-white">
                    <div className="flex flex-1 flex-col overflow-hidden">
                        {renderPage()}
                    </div>
                    {isLoggedIn && (
                        <nav className="fixed bottom-0 left-0 right-0 z-50 bg-dark-bg border-t border-white/10">
                            <div className="flex justify-around items-center h-16 px-4">
                                <button onClick={() => setCurrentPage('dashboard')} className="flex flex-col items-center text-white/60 hover:text-primary transition-colors p-1">
                                    <span className="material-symbols-outlined text-xl">dashboard</span>
                                    <span className="text-xs font-medium">Dashboard</span>
                                </button>
                                <button onClick={() => setCurrentPage('category')} className="flex flex-col items-center text-white/60 hover:text-primary transition-colors p-1">
                                    <span className="material-symbols-outlined text-xl">category</span>
                                    <span className="text-xs font-medium">Catégorie</span>
                                </button>
                                <button onClick={() => setCurrentPage('table')} className="flex flex-col items-center text-white/60 hover:text-primary transition-colors p-1">
                                    <span className="material-symbols-outlined text-xl">table_restaurant</span>
                                    <span className="text-xs font-medium">Tables</span>
                                </button>
                                <button onClick={() => setCurrentPage('kitchen')} className="flex flex-col items-center text-white/60 hover:text-primary transition-colors p-1">
                                    <span className="material-symbols-outlined text-xl">kitchen</span>
                                    <span className="text-xs font-medium">Cuisine</span>
                                </button>
                                <button onClick={() => setCurrentPage('bar')} className="flex flex-col items-center text-white/60 hover:text-primary transition-colors p-1">
                                    <span className="material-symbols-outlined text-xl">local_bar</span>
                                    <span className="text-xs font-medium">Bar</span>
                                </button>
                                <button onClick={() => setCurrentPage('menu')} className="flex flex-col items-center text-white/60 hover:text-primary transition-colors p-1">
                                    <span className="material-symbols-outlined text-xl">menu</span>
                                    <span className="text-xs font-medium">Menu</span>
                                </button>
                            </div>
                        </nav>
                    )}
                </div>
            );
        }

        // Render l'app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
