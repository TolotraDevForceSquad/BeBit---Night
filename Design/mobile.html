                { id: 3, type: "Article Mis à Jour", description: "Statut changé pour item 1", userId: 2, userName: "Bob Martin", userRole: "Cuisinier", timestamp: "2025-11-06T10:00:00Z", amount: 0, orderId: 1, tableId: 2, tableName: "Table 2", details: "En préparation", status: "Succès" },
                { id: 4, type: "Table Libérée", description: "Fin de commande pour table 3", userId: 1, userName: "Alice Dupont", userRole: "Serveur", timestamp: "2025-11-06T09:45:00Z", amount: 0, orderId: 3, tableId: 3, tableName: "Table 3", details: "Nettoyage initié", status: "Succès" },

                { id: 6, type: "Produit Ajouté", description: "Nouveau produit burger ajouté", userId: 4, userName: "David Roux", userRole: "Manager", timestamp: "2025-11-06T08:00:00Z", amount: 0, orderId: null, tableId: null, tableName: "", details: "Catégorie plats principaux", status: "Succès" },
                { id: 7, type: "Employé Connecté", description: "Connexion device 1", userId: 1, userName: "Alice Dupont", userRole: "Serveur", timestamp: "2025-11-06T09:00:00Z", amount: 0, orderId: null, tableId: null, tableName: "", details: "Salle principale", status: "Succès" },
                { id: 8, type: "Commande Annulée", description: "Annulation partielle commande 4", userId: 2, userName: "Bob Martin", userRole: "Cuisinier", timestamp: "2025-11-06T10:15:00Z", amount: -1800, orderId: 4, tableId: 1, tableName: "Table 1", details: "Client changé d'avis", status: "Succès" }
            ],
            paymentMethods: [
                { id: 1, name: "Carte Bancaire", value: 0 },
                { id: 2, name: "Espèces", value: 0 },

                { id: 4, name: "Mobile Pay", value: 0 }
            ]
        };
        
        // --- Fonctions d'utilité et de style ---
        const getStatusColor = (status) => {
            switch (status) {
                case 'Actif':
                case 'Disponible':
                case 'Succès':
                case 'Libre':
                case 'Prête':
                    return 'text-green-400 border-green-400';
                case 'Occupée':
                case 'En Cours':
                case 'En Préparation':
                case 'Nouvelle':
                    return 'text-accent-pink border-accent-pink'; // Rose pour Occupée/En cours
                case 'Inactif':
                case 'Indisponible':
                case 'En Nettoyage':
                case 'Annulée':
                    return 'text-gray-400 border-gray-400';
                case 'Réservée':
                    return 'text-yellow-400 border-yellow-400';
                case 'Échec':
                    return 'text-accent-red border-accent-red'; // Rouge
                case 'Payée':
                    return 'text-accent-violet border-accent-violet'; // Violet
                default:
                    return 'text-gray-400 border-gray-400';
            }
        };

        const getPriorityColor = (priority) => {
            switch (priority) {
                case 'Haute':
                    return 'bg-accent-red';
                case 'Normale':
                    return 'bg-accent-pink';
                case 'Basse':
                    return 'bg-gray-500';
                default:
                    return 'bg-gray-500';
            }
        }


        // Composant Modal générique pour CRUD
        const Modal = ({ isOpen, onClose, title, children, onSubmit }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
                    <div className="bg-secondary-dark p-6 rounded-xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto border border-gray-700">
                        <div className="flex justify-between items-center mb-6 border-b border-gray-700 pb-3">
                            <h2 className="text-2xl font-bold text-accent-violet">{title}</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-accent-red text-3xl transition duration-150">&times;</button>
                        </div>
                        <form onSubmit={onSubmit} className="space-y-4">
                            {children}
                            <div className="flex space-x-3 pt-4">
                                <button type="submit" className="flex-1 bg-accent-violet text-white py-3 px-4 rounded-lg font-semibold hover:bg-purple-600 transition duration-150 shadow-md shadow-accent-violet/30">
                                    <i className="fas fa-save mr-2"></i> Sauvegarder
                                </button>
                                <button type="button" onClick={onClose} className="flex-1 bg-gray-600 text-gray-200 py-3 px-4 rounded-lg font-semibold hover:bg-gray-700 transition duration-150">
                                    <i className="fas fa-times mr-2"></i> Annuler
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };
        
        // Composant Input/Select de style sombre
        const DarkInput = (props) => (
            <input 
                {...props} 
                className="w-full p-3 bg-gray-700 border border-gray-600 text-gray-100 rounded-lg focus:ring-accent-violet focus:border-accent-violet transition duration-150" 
            />
        );

        const DarkTextArea = (props) => (
            <textarea 
                {...props} 
                className="w-full p-3 bg-gray-700 border border-gray-600 text-gray-100 rounded-lg focus:ring-accent-violet focus:border-accent-violet transition duration-150" 
            />
        );

        const DarkSelect = (props) => (
            <select 
                {...props} 
                className="w-full p-3 bg-gray-700 border border-gray-600 text-gray-100 rounded-lg appearance-none focus:ring-accent-violet focus:border-accent-violet transition duration-150"
            >
                {props.children}
            </select>
        );


        // Composant Liste avec CRUD
        const CrudList = ({ title, items, columns, onAdd, onEdit, onDelete, renderItem }) => (
            <div className="bg-secondary-dark p-4 rounded-xl shadow-lg border border-gray-700">
                <div className="flex justify-between items-center mb-4 pb-2 border-b border-gray-700">
                    <h3 className="text-xl font-bold text-accent-pink">{title}</h3>
                    <button onClick={onAdd} className="bg-accent-violet text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-purple-600 transition duration-150 shadow-md shadow-accent-violet/30">
                        <i className="fas fa-plus mr-1"></i> Ajouter
                    </button>
                </div>
                <div className="overflow-x-auto">
                    <table className="min-w-full table-auto">
                        <thead>
                            <tr className="bg-gray-700 text-gray-300 text-sm">
                                {Object.keys(columns).map(key => <th key={key} className="px-3 py-2 text-left font-medium">{key.charAt(0).toUpperCase() + key.slice(1)}</th>)}
                                <th className="px-3 py-2 font-medium text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {items.map(item => (
                                <tr key={item.id} className="border-b border-gray-700 hover:bg-gray-700/50 transition duration-150 text-sm">
                                    {renderItem ? renderItem(item) : Object.keys(columns).map(key => {
                                        let value = item[key];
                                        let className = "px-3 py-2";

                                        if (columns[key] === "boolean") {
                                            value = value ? 'Actif' : 'Inactif';
                                            className += ` font-semibold ${getStatusColor(value)}`;
                                        } else if (columns[key] === "integer") {
                                            value = value || value === 0 ? value : 'N/A';
                                        }
                                        return <td key={key} className={className}>{value}</td>;
                                    })}
                                    <td className="px-3 py-2 space-x-1 text-center">
                                        <button onClick={() => onEdit(item)} className="text-accent-violet hover:text-purple-400 p-1 rounded-full transition duration-150">
                                            <i className="fas fa-edit"></i>
                                        </button>
                                        <button onClick={() => onDelete(item.id)} className="text-accent-red hover:text-red-400 p-1 rounded-full transition duration-150">
                                            <i className="fas fa-trash-alt"></i>
                                        </button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );
        
        // --- Sections de l'application (CRUD et Vues) ---

        // Composant Employés CRUD
        const EmployeesSection = ({ employees, devices, onUpdate }) => {
            const [editEmployee, setEditEmployee] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [formData, setFormData] = useState({});

            const handleAdd = () => {
                setFormData({ name: '', role: '', pin: '', status: true, deviceId: null });
                setShowModal(true);
            };

            const handleEdit = (employee) => {
                setEditEmployee(employee);
                setFormData({ ...employee });
                setShowModal(true);
            };

            const handleDelete = (id) => {
                if (window.confirm('Confirmer suppression?')) {
                    onUpdate({ employees: employees.filter(e => e.id !== id) });
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editEmployee) {
                    onUpdate({ employees: employees.map(e => e.id === editEmployee.id ? { ...formData, id: e.id } : e) });
                } else {
                    const newId = Math.max(...employees.map(e => e.id), 0) + 1;
                    onUpdate({ employees: [...employees, { ...formData, id: newId }] });
                }
                setShowModal(false);
                setEditEmployee(null);
            };

            return (
                <div>
                    <CrudList
                        title="🧑‍💻 Gestion Employés"
                        items={employees}
                        columns={{ name: 'text', role: 'text', pin: 'text', status: 'boolean', deviceId: 'integer' }}
                        onAdd={handleAdd}
                        onEdit={handleEdit}
                        onDelete={handleDelete}
                        renderItem={(item) => (
                            <>
                                <td>
                                    <div className="flex items-center space-x-2">
                                        <img src={item.imageUrl} alt={item.name} className="w-8 h-8 rounded-full object-cover border border-gray-600" />
                                        <span>{item.name}</span>
                                    </div>
                                </td>
                                <td>{item.role}</td>
                                <td>{item.pin}</td>
                                <td className={`font-semibold ${getStatusColor(item.status ? 'Actif' : 'Inactif')}`}>{item.status ? 'Actif' : 'Inactif'}</td>
                                <td>{devices.find(d => d.id === item.deviceId)?.name || 'N/A'}</td>
                            </>
                        )}
                    />
                    <Modal isOpen={showModal} onClose={() => setShowModal(false)} title={editEmployee ? 'Éditer Employé' : 'Ajouter Employé'} onSubmit={handleSubmit}>
                        <DarkInput type="text" placeholder="Nom" value={formData.name || ''} onChange={e => setFormData({ ...formData, name: e.target.value })} required />
                        <DarkInput type="text" placeholder="Rôle" value={formData.role || ''} onChange={e => setFormData({ ...formData, role: e.target.value })} required />
                        <DarkInput type="password" placeholder="PIN" value={formData.pin || ''} onChange={e => setFormData({ ...formData, pin: e.target.value })} required />
                        <DarkSelect value={formData.status || false} onChange={e => setFormData({ ...formData, status: e.target.value === 'true' })}>
                            <option value={true}>Actif</option>
                            <option value={false}>Inactif</option>
                        </DarkSelect>
                        <DarkSelect value={formData.deviceId || ''} onChange={e => setFormData({ ...formData, deviceId: parseInt(e.target.value) || null })}>
                            <option value="">Pas de Device</option>
                            {devices.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                        </DarkSelect>
                    </Modal>
                </div>
            );
        };

        // Composant Devices CRUD
        const DevicesSection = ({ devices, onUpdate }) => {
            const [editDevice, setEditDevice] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [formData, setFormData] = useState({});

            const handleAdd = () => {
                setFormData({ name: '', location: '', status: true, lastActive: new Date().toISOString(), sales: 0 });
                setShowModal(true);
            };

            const handleEdit = (device) => {
                setEditDevice(device);
                setFormData({ ...device });
                setShowModal(true);
            };

            const handleDelete = (id) => {
                if (window.confirm('Confirmer suppression?')) {
                    onUpdate({ posDevices: devices.filter(d => d.id !== id) });
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editDevice) {
                    onUpdate({ posDevices: devices.map(d => d.id === editDevice.id ? { ...formData, id: d.id } : d) });
                } else {
                    const newId = Math.max(...devices.map(d => d.id), 0) + 1;
                    onUpdate({ posDevices: [...devices, { ...formData, id: newId }] });
                }
                setShowModal(false);
                setEditDevice(null);
            };

            return (
                <div>
                    <CrudList
                        title="📱 Gestion Devices"
                        items={devices}
                        columns={{ name: 'text', location: 'text', status: 'boolean', lastActive: 'text', sales: 'integer' }}
                        onAdd={handleAdd}
                        onEdit={handleEdit}
                        onDelete={handleDelete}

                        return <TableTab data={data} onUpdate={updateData} />;
                    case 'cuisine':
                        return <CuisineTab data={data} />;
                    case 'bar':
                        return <BarTab data={data} />;
                    case 'menu':
                        return <MenuTab products={data.products} categories={data.productCategories} />;
                    default:
                        return <DashboardTab data={data} onUpdate={updateData} />;
                }
            };

            return (
                <div className="flex flex-col h-screen">
                    <header className="bg-primary-dark border-b border-gray-700 p-4 shadow-xl sticky top-0 z-10">
                        <h1 className="text-2xl font-bold text-accent-pink">POS <span className="text-accent-violet">Mobile</span></h1>
                    </header>
                    <main className="flex-1 overflow-y-auto pb-20">
                        {renderTab()}
                    </main>
                    <nav className="fixed bottom-0 left-0 right-0 bg-secondary-dark border-t border-gray-700 flex justify-around py-2 shadow-2xl z-20">
                        {[
                            { key: 'dashboard', label: 'Dashboard', icon: 'fas fa-chart-line' },
                            { key: 'categorie', label: 'Catalogue', icon: 'fas fa-tags' },
                            { key: 'table', label: 'Salles', icon: 'fas fa-table' },
                            { key: 'cuisine', label: 'Cuisine', icon: 'fas fa-utensils' },
                            { key: 'bar', label: 'Bar', icon: 'fas fa-cocktail' },
                            { key: 'menu', label: 'Menu Client', icon: 'fas fa-book-open' }
                        ].map(tab => (
                            <button
                                key={tab.key}
                                onClick={() => setCurrentTab(tab.key)}
                                className={`flex flex-col items-center p-2 rounded-lg transition duration-150 ${currentTab === tab.key ? 'text-accent-violet bg-gray-700/50' : 'text-gray-500 hover:text-gray-300'}`}
                            >
                                <i className={`${tab.icon} text-xl`}></i>
                                <span className="text-xs mt-1 font-medium">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
